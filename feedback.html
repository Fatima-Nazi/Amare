<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Amare Perfume</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f9f9f9;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #000;
      box-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img { height: 55px; }

    .nav-links a {
      text-decoration: none;
      color: #fff;
      margin: 0 15px;
      font-weight: 500;
      font-size: 14px;
    }

    .nav-links a:hover { color: #d4a373; }

    .cart-icon-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      position: relative;
      color: #fff;
    }

    .cart-count-badge {
      position: absolute;
      top: -5px;
      right: -10px;
      background: #d4a373;
      color: #000;
      font-size: 10px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .feedback-card {
      background: #fff;
      max-width: 720px;
      padding: 50px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      border-top: 5px solid #000;
    }

    .feedback-icon {
      width: 80px;
      height: 80px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 35px;
    }

    .form-control {
      margin-bottom: 20px;
      padding: 15px;
    }

    .btn-submit {
      width: 100%;
      background: #000;
      color: #fff;
      padding: 15px;
      border: none;
    }

    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
    }

    .star-rating label {
      font-size: 30px;
      cursor: pointer;
    }

    .star-rating input { display: none; }

    .star-rating input:checked~label,
    .star-rating label:hover,
    .star-rating label:hover~label {
      color: #ffc107;
    }

    .footer {
      background: #000;
      color: #888;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<div class="main-content">
  <div class="feedback-card">

    <h2>Send Us Feedback</h2>

    <form onsubmit="sendFeedback(event)">

      <div class="star-rating">
        <input type="radio" id="5-stars" name="rating" value="5" required>
        <label for="5-stars" class="fas fa-star"></label>

        <input type="radio" id="4-stars" name="rating" value="4">
        <label for="4-stars" class="fas fa-star"></label>

        <input type="radio" id="3-stars" name="rating" value="3">
        <label for="3-stars" class="fas fa-star"></label>

        <input type="radio" id="2-stars" name="rating" value="2">
        <label for="2-stars" class="fas fa-star"></label>

        <input type="radio" id="1-star" name="rating" value="1">
        <label for="1-star" class="fas fa-star"></label>
      </div>

      <input type="text" id="fb-name" class="form-control" placeholder="Your Name" required>
      <input type="email" id="fb-email" class="form-control" placeholder="Your Email">

      <textarea id="fb-msg" class="form-control" rows="5" placeholder="Message" required></textarea>

      <button type="submit" class="btn-submit">
        <i class="fab fa-whatsapp"></i> Send via WhatsApp
      </button>

    </form>
  </div>
</div>

<script>
function sendFeedback(e) {
  e.preventDefault();

  const name = document.getElementById('fb-name').value.trim();
  const email = document.getElementById('fb-email').value.trim();
  const msg = document.getElementById('fb-msg').value.trim();

  const rating = document.querySelector('input[name="rating"]:checked');
  const ratingValue = rating ? rating.value : "Not Rated";

  let text = `*Website Feedback* 📝
--------------------------
*Name:* ${name}
${email ? `*Email:* ${email}` : ""}
*Rating:* ${ratingValue} Stars ⭐
--------------------------
*Message:*
${msg}`;

  window.open(`https://wa.me/923313077774?text=${encodeURIComponent(text)}`, '_blank');
}
</script>

</body>
</html>
