<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attar — Amare Perfume</title>

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { font-family: Poppins, sans-serif; background:#f9f9f9; }

    .header { background:#000; padding:15px; }
    .header a { color:#fff; margin:0 10px; text-decoration:none; }

    .product-card { background:#fff; padding:20px; margin:20px; border-radius:10px; text-align:center; }
    .product-card img { width:100%; height:250px; object-fit:cover; }

    .cart-sidebar {
      position:fixed; right:-400px; top:0; width:400px; height:100%;
      background:#fff; transition:0.3s; padding:20px;
    }
    .cart-sidebar.open { right:0; }

    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      display:none;
    }
    .overlay.show { display:block; }
  </style>
</head>

<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<!-- HEADER -->
<div class="header">
  <a href="index.html">Home</a>
  <a href="attar.html">Attar</a>
  <a href="feedback.html">Feedback</a>

  <button onclick="toggleCart()" style="float:right;">
    <i class="fas fa-shopping-bag"></i>
    <span id="header-cart-count">0</span>
  </button>
</div>

<!-- PRODUCTS -->
<div class="product-card">
  <img src="img/Oud313.png">
  <h3>OUD 313</h3>
  <p>Rs 2199</p>
  <button onclick="addToCart('OUD 313',2199,'img/Oud313.png')">Add to Cart</button>
</div>

<div class="product-card">
  <img src="img/Oud313niour.png">
  <h3>OUD 313 NOIR</h3>
  <p>Rs 2199</p>
  <button onclick="addToCart('OUD 313 NOIR',2199,'img/Oud313niour.png')">Add to Cart</button>
</div>

<!-- CART -->
<div class="cart-sidebar" id="cart-sidebar">
  <h3>Your Cart</h3>
  <div id="cart-items-container"></div>

  <input type="text" id="cust-name" placeholder="Your Name"><br><br>
  <input type="text" id="cust-addr" placeholder="Address"><br><br>

  <h4 id="cart-total">Rs 0</h4>

  <button onclick="orderAll()">Order WhatsApp</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const sidebar = document.getElementById('cart-sidebar');
const overlay = document.getElementById('overlay');
const cartContainer = document.getElementById('cart-items-container');

document.addEventListener('DOMContentLoaded', () => {
  updateCartUI();
});

function toggleCart() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

function addToCart(name, price, img) {
  const item = cart.find(i => i.name === name);

  if(item) item.quantity++;
  else cart.push({name, price, img, quantity:1});

  saveCart();
  updateCartUI();
}

function updateCartUI() {
  cartContainer.innerHTML = "";
  let total = 0;
  let count = 0;

  cart.forEach((item, i) => {
    total += item.price * item.quantity;
    count += item.quantity;

    cartContainer.innerHTML += `
      <div>
        ${item.name} x ${item.quantity}
        <button onclick="changeQty(${i},1)">+</button>
        <button onclick="changeQty(${i},-1)">-</button>
      </div>
    `;
  });

  document.getElementById("cart-total").innerText = "Rs " + total;
  document.getElementById("header-cart-count").innerText = count;
}

function changeQty(i, val) {
  cart[i].quantity += val;
  if(cart[i].quantity <= 0) cart.splice(i,1);
  saveCart();
  updateCartUI();
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function orderAll() {
  const name = document.getElementById("cust-name").value.trim();
  const addr = document.getElementById("cust-addr").value.trim();

  if(!name || !addr) {
    alert("Enter details");
    return;
  }

  if(cart.length === 0) {
    alert("Cart empty");
    return;
  }

  let msg = `*New Order* 🛍️
--------------------------
Name: ${name}
Address: ${addr}
--------------------------
`;

  let total = 0;

  cart.forEach(item => {
    msg += `${item.name} x ${item.quantity} = Rs ${item.price * item.quantity}
`;
    total += item.price * item.quantity;
  });

  msg += `--------------------------
Total: Rs ${total}`;

  window.open(`https://wa.me/923313077774?text=${encodeURIComponent(msg)}`, '_blank');

  cart = [];
  saveCart();
  updateCartUI();
}
</script>

</body>
</html>
